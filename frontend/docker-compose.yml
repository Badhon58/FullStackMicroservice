version: "3.7"

services:
  frontend:
    container_name: frontend_container
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_ACKEE_DOMAIN_ID=${NEXT_PUBLIC_ACKEE_DOMAIN_ID}
      - NEXT_PUBLIC_ACKEE_URL=${NEXT_PUBLIC_ACKEE_URL}
